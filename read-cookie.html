<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Read Cookie | Transaction Manager</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="result-container">
        <div class="result-icon">🍪</div>
        <h1>Account Context</h1>
        <div class="result-data" id="output"></div>
        <div class="links"><a href="index.html">Back to Dashboard</a></div>
    </div>

    <script>
        const getCookie = (name) => {
            const value = `; ${document.cookie}`;
            const parts = value.split(`; ${name}=`);
            if (parts.length === 2) return decodeURIComponent(parts.pop().split(';').shift());
            return "No Account Set";
        };

        const accountName = getCookie('account_name');
        document.getElementById('output').innerHTML = `
            <div class="result-item"><span class="result-label">Cookie Key:</span> <span class="result-value">account_name</span></div>
            <div class="result-item"><span class="result-label">Cookie Value:</span> <span class="result-value">${accountName}</span></div>
        `;
    </script>
</body>
</html>
